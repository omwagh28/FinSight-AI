

services:

  backend:
    build:
      context: ./backend

    container_name: finsight-backend

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: finsight-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    restart: unless-stopped